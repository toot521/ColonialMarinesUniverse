  - message: Added the Trapper boiler strain, a further specialized boiler focusing
      on ambushes and rapidly chewing through marine static defenses.
    type: Add
  - message: Added the Deploy Traps ability, a rapid deployment of snaring traps to
      snare prey, able to even be deployed right under their feet, though easily destroyed
      by shooting or with a melee attack. Includes SFX for getting snared. Deploy
      Traps can also be empowered by Insight, and will in turn empower Acid Mine when
      cast this way.
