- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUbudgetConsole
  name: budget console
  description: A budget console
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.BudgetConsoleUi.Key
  - type: UserInterface
    interfaces:
      enum.BudgetConsoleUi.Key:
        type: BudgetConsoleBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: BudgetConsole
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ], [ "CMAccessColonyCommand" ] ]
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - Currency
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}

- type: entity
  parent: BaseStructure
  id: AUSubmissionPointBase
  name: submission point
  description: A place to submit  resources for shipping.
  suffix: Any
  components:
  - type: Sprite
    sprite: _AU14/Structures/colony_processor.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: InteractionOutline
  - type: ThrowInsertContainer
    containerId: submission
    probability: 100
  - type: SubmissionStorage
    rewards:
      SteelOre: 5
      AUwood: 20
      Vegetable: 1
      Fruit: 2
      CottonBoll: 2
      CMUGrain: 2
  - type: ContainerContainer
    containers:
      submission: !type:Container
      disposals: !type:Container
  - type: DisposalUnit
    whitelist:
      tags:
      - SteelOre
      - AUwood
      - Vegetable
      - Fruit
      - CottonBoll
      - CMUGrain

- type: entity
  parent: AUSubmissionPointBase
  id: AUSubmissionPointSteel
  name: submission point (steel)
  suffix: Steel
  description: A place to submit  resources for shipping.
  components:
  - type: SubmissionStorage
    rewards:
      SteelOre: 10
  - type: DisposalUnit
    whitelist:
      tags:
      - SteelOre

- type: Tag
  id: SteelOre

