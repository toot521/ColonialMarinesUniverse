- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUColonyCommsConsole
  name: Colony Communications Console
  description: Used to send announcements to all colony intercoms in range.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.ColonyCommsConsoleUI.Key
  - type: UserInterface
    interfaces:
      enum.ColonyCommsConsoleUI.Key:
        type: ColonyCommsConsoleBui
  - type: AccessReader
    access: [[ "CMAccessColonyCommand" ]]
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: ColonyCommsConsole

- type: entity
  id: AUColonyIntercom
  name: Colony Intercom
  description: A public intercom for colony-wide announcements.
  components:
  - type: IntrinsicRadioReceiver
  - type: Speech
  - type: ActiveRadio
    channels:
    - colonyAlert
  - type: RadioSpeaker
    enabled: true
    channels:
    - colonyAlert
  - type: Sprite
    noRot: false
    drawdepth: SmallObjects
    sprite: _RMC14/Structures/Wallmounts/intercom.rsi
    layers:
    - state: intercom-p
    - state: intercom
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
    - state: broadcasting
      map: ["enum.RadioDeviceVisualLayers.Broadcasting"]
      shader: unshaded
      visible: false
    - state: speaker
      map: ["enum.RadioDeviceVisualLayers.Speaker"]
      shader: unshaded
      visible: false
  - type: Transform
    noRot: false
    anchored: true

- type: entity
  id: colonysiren
  name: Colony Siren
  parent: BaseStructure
  description: Emits a loud siren when activated.
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Misc/Lights/trafficlights.rsi
    offset: 0.65,0.8
    layers:
    - state: trafficlight
    - state: trafficlight_on
      visible: false
      map: [ "light" ]
    drawdepth: Mobs
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        density: 50
        mask:
        - MachineMask
        layer:
        - WallLayer
  - type: ColonySiren

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUColonyATM
  name: Colony ATM
  description: Swipe your ID card on the machine to withdraw cash from your personal account.
  components:
  - type: Sprite
    sprite: _CMU14/Structures/Machines/atm.rsi
    state: atm
  - type: InteractionOutline
  - type: UserInterface
    interfaces:
      enum.ColonyAtmUi.Key:
        type: ColonyAtmBui
  - type: ColonyAtm

# Department Consoles
- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUDepartmentConsoleBase
  abstract: true
  name: Department Console
  description: A console for managing department employees, salaries, and communications. Insert cash to fund the department.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.DepartmentConsoleUi.Key
  - type: UserInterface
    interfaces:
      enum.DepartmentConsoleUi.Key:
        type: DepartmentConsoleBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: DepartmentConsole
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["CMAccessColonyCommand"]] # auadmin & aucmb
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - RMCSpaceCash
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}

