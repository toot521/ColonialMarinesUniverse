- type: entity
  id: PlatoonSpawn
  parent: BaseGameRule
  components:
  - type: PlatoonSpawnRule

- type: entity
  id: AddGovfor
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    addToShip: true
    shipFaction: govfor
    jobs:
      AU14JobGOVFORPlatCo: 1
      AU14JobGOVFORPlatoonCorpsman: 9
      AU14JobGOVFORDCC: 2
      AU14JobGOVFORPlatOp: 5
      AU14JobGOVFORDSPilot: 2
      AU14JobGOVFORRadioTelephoneOperator: 4
      AU14JobGOVFORSquadSergeant: 3
      AU14JobGOVFORSquadAutomaticRifleman: 3
      AU14JobGOVFORSquadCombatTech: 6
      AU14JobGOVFORSquadRifleman: 75
      AU14JobGOVFORWeaponsSpecialist: 3
      AU14JobGOVFORAuxSupportSynth: 2
      AU14JobGOVFORadvisor: 1
      AU14JobGOVFORMilitaryDoctor: 3
      AU14JobGOVFORMilitaryPoliceMan: 2
      AU14JobGOVFORAuxTech: 1
      AU14JobGOVFORWorkingJoe: 1

- type: entity
  id: AddOpfor
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    shipFaction: opfor
    addToShip: true
    jobs:
      AU14JobOpforPlatCo: 1
      AU14JobOpforPlatoonCorpsman: 9
      AU14JobOpforDCC: 2
      AU14JobOpforPlatOp: 5
      AU14JobOpforDSPilot: 2
      AU14JobOpforRadioTelephoneOperator: 4
      AU14JobOpforSquadSergeant: 3
      AU14JobOpforSquadAutomaticRifleman: 3
#     AU14JobOPFORWeaponsSpecialist: 3 # TODO
      AU14JobOPFORSquadCombatTech: 6
      AU14JobOpforSquadRifleman: 75
      AU14JobOPFORAuxSupportSynth: 2
      AU14JobOPFORadvisor: 1
      AU14JobOPFORMilitaryDoctor: 3
      AU14JobOPFORWorkingJoe: 1
      AU14JobOPFORAuxTech: 1
#     AU14JobOPFORMilitaryPoliceMan: 2 # TODO

- type: entity
  id: AddClf
  parent: BaseGameRule
  components:
  - type: AddJobsRule
    jobs:
      AU14JobCLFCellLeader: 1
      AU14JobCLFPhysician: 1
      AU14JobCLFSurgeon: 1
      AU14JobCLFGuerilla: 3

- type: entity
  id: ColonyAntags
  parent: BaseGameRule
  name: Colony Antags
  description: Randomly rolls for each colony antag to be present this round.
  components:
  - type: GameRule
  - type: ColonyAntagsRule

- type: entity
  id: AuVoteRule
  parent: BaseGameRule
  name: Colony Antags
  description: If you want your mode to load planets and platoons automatically
  components:
  - type: AuVoteRule
  - type: Bioscan

- type: entity
  id: RemoveAllJobs
  parent: BaseGameRule
  name: Remove All Jobs
  description: Removes all jobs on the planet's main station prior to round start. Optionally removes jobs on ship stations.
  components:
  - type: RemoveJobsRule

- type: GamePlanetPool
  id: ColonyPlanetPool
  planets:
  - AUPlanetLV747
  - AUPlanetShepherdsPride
  - AUPlanetStableGarrison
  - AUPlanetLV624
  - AUPlanetFlight
