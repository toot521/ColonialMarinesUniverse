- type: gamePreset
  id: ForceOnForce
  alias:
  - forceonforce
  name: Force on Force
  showInVote: true
  description: Two units face each other in combat.
  minPlayers: 125
  requiresOpforVote: true
  requiresGovforVote: true
  supportedPlanets:
  #- AUPlanetGixensCaverns Rout of rotation till fixed - eg
  #- AUPlanetShepherdsPride
  #- AUPlanetFlight
  - AUPlanetLV759
  - AUPlanetLV327
  - AUPlanetCorsatStation
  - AUPlanetSorokyne
  - AUPlanetStableGarrison
  - AUPlanetTrijent
  - CMUPlanetLament
  rules:
  - AuVoteRule
  - PlatoonSpawn
  - RemoveAllJobs
  - AddGovfor
  - AddOpfor

