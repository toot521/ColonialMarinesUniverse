  ignoreAllegiance: true
  playTimeTracker: AU14JobCLFCellLeader
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankCivilian: []
  startingGear: AU14GearCLFCellLeader
  icon: RMCJobIconCLFCellCommander
  hasIcon: false
  requireAdminNotify: true
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clfcellleader
  spawnMenuRoleName: CLF Cell Leader (CMU)
  accessGroups:
  - Colonist
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: CLFMember
      statusIcon: CLFFactionLeader
    - type: Skills
      skills:
        RMCSkillCqc: 2
        RMCSkillConstruction: 2
        RMCSkillEndurance: 2
        RMCSkillEngineer: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 2
        RMCSkillIntel: 2
        RMCSkillJtac: 4
        RMCSkillLeadership: 3
        RMCSkillMedical: 1
        RMCSkillNavigations: 1
        RMCSkillOverwatch: 1
        RMCSkillPolice: 1
        RMCSkillPowerLoader: 1
        RMCSkillSurgery: 1
        RMCSkillVehicles: 1
    - type: JobPrefix
      prefix: au14-job-prefix-clfcellleader
    - type: StartingMindRole
      mindRole: MindRoleCLFLeader
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: ShowMarineIcons
      factions:
      - CLF
  hidden: false

- type: startingGear
  id: AU14GearCLFCellLeader
  equipment:
    outerClothing: AU14ExternalWebbing
    gloves: RMCHandsVeteranSPP
    shoes: RMCScoutShoes
    neck: RMCCLFArmband
    head: AU14CivBallCapBlack
    id: AU14IDCardCLFCellLeader
    eyes: RMCGlassesAviators
    pocket1: AU14StampCLFCell
  inhand:
  - AU14CLFCellKit
  - AU14CLFHeadset

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointCLFCellLeader
  name: Spawn Point CLF Cell Leader
  components:
  - type: SpawnPoint
    job_id: AU14JobCLFCellLeader
  - type: Sprite
    state: syn_spawn
  - type: SafehouseMarker
- type: playTimeTracker
  id: AU14JobCLFCellLeader
  isHumanoid: true
