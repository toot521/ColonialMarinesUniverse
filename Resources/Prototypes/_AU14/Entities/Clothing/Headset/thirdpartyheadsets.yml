- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetUSArmy
  name: US Army headset
  description: Issued to US Army units.
  suffix: US Army
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: soc_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyColony
  - type: RMCHeadset
    channels:
    - UASOF
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - USArmyCommandingOfficer
    - BattleBuddy
    - PrimaryLandingZone

