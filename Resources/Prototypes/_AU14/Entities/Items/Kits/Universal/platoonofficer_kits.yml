- type: entity
  abstract: true
  parent: RMCKitBase
  id: AU14KitPlatoonOfficer
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: Icon
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,5,3

- type: entity
  parent: AU14KitPlatoonOfficer
  id: AU14KitJOStaffOfficerKit
  name: Staff Officer (SO) Kit
  description: >-
    The battle-planning kit is suited for working alongside the Commander in the CIC to coordinate combat operations and plan the next miracle.

    Commonly called a CO's greatest ally, that keeps the operation and the orders flowing. If the XO runs the ship, the SO runs the fight.
  components:
  - type: StorageFill
    contents:
      - id: AU14HeadBeretSO
        amount: 1
      - id: AU14WebbingDropPouch
        amount: 1
      - id: RMCHeadUNMCHeadset
        amount: 1
      - id: RMCM5CameraGear
        amount: 1
      - id: RMCMegaphone
        amount: 1
      - id: RMCLaserDesignatorPVE
        amount: 1
      - id: AU14StampSO
        amount: 1


- type: entity
  parent: AU14KitPlatoonOfficer
  id: AU14KitJOIntelligenceOfficer
  name: Intelligence Officer (IO) Kit
  description: >-
    The CIC's most valuable asset, provided they stay in contact and let the information do the shooting.

    This kit is suited for deploying into the field to gather and relay critical intelligence back to command.

    Where the XO is the heart, an SO the mouth, an EO the brains, the IO is the eyes and ears of a command element.
  components:
  - type: StorageFill
    contents:
      - id: AU14HeadBeretIO
        amount: 1
      - id: RMCM5CameraGear
        amount: 1
      - id: CMHandsInsulated
        amount: 1
      - id: AU14WebbingDumpPouch
        amount: 1
