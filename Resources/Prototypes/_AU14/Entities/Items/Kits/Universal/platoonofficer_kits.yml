        amount: 1
      - id: RMCWeaponPistolM82FEmpty
        amount: 1
      - id: RMCPackFlareCAS
        amount: 1
      - id: AU14StampIO
        amount: 1

- type: entity
  parent: AU14KitPlatoonOfficer
  id: AU14KitJOEngineeringKit
  name: Engineering Officer (EO) Kit
  description: >-
    This engineering kit is suited for deploying into the field to support engineering efforts such as constructing forward operating bases and maintaining infrastructure.

    Either a seasoned technician taking care of the FOB, or the first to commandeer the humvee's keys. Includes a reset key for when the synths get philosophical.
  components:
  - type: StorageFill
    contents:
      - id: CMHeadBeretEngineer
        amount: 1
      - id: RMCHazardVest
        amount: 1
      - id: AU14BeltUtilityCombatFilled
        amount: 1
      - id: RMCKitEngineering
        amount: 1
      - id: RMCM5CameraGear
        amount: 1
      - id: RMCSynthResetKey
        amount: 1
      - id: RMCNailgunTactical
        amount: 1
      - id: RMCMagazineSMGNailgun
        amount: 2
      - id: AU14StampEO
        amount: 1

- type: entity
  parent: AU14KitPlatoonOfficer
  id: AU14KitJOAdjutantKit
  name: Adjutant Officer (XO) Kit
  description: >-
    The administrative heart of the command element. The most senior is the XO, the CO's second in command (who actually reads the fine print).

    Stuffed with tools needed to turn reports into orders, process intelligence reports aboard the ship and turn chaos into clarity.
