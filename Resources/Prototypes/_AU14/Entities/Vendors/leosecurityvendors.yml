- type: entity
  parent: ColMarTechBase
  id: AU14CMBequipmentvendor
  name: CMB equipment vendor
  description: >-
    An automated dispenser rack, hooked up to a small storage of Colonial Marshall Bureau equipment.
    Stocked with apparel and law enforcement field gear for rapid deployment.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/requisitions_ammo.rsi
  - type: CMAutomatedVendor
    jobs: [ AU14JobLEOLeaderBase, AU14JobLEOBase, AU14JobCivilianCMBDeputy, AU14JobCivilianCMBMarshal, AU14JobCivilianCWPSRanger, AU14JobCivilianNSPAConstable, AU14JobCivilianNSPAInspector ]
    sections:
    - name: Clothes
      takeAll: CMUCMBEssentialEquipmentClothes
      entries:
      - id: AU14CMBUniform
      - id: RMCHeadCapBureau
      - id: RMCBootsPMCFilled
      - id: CMGlassesSecurity
    - name: Headgear
      choices: { CMUCMBDutyHeadgear: 1 }
      entries:
      - id: AU14HeadCommandoBeanie
    - name: Outerwear
      choices: { CMUCMBDutyJacket: 1 }
      entries:
      - id: AU14CMBDeputyWindbreaker
      - id: RMCCoatSnowSurvivorCMBDeputy
    - name: Belt
      takeAll: CMUCMBEssentialEquipmentBelt
      entries:
      - id: CMBeltSecurityMarshalFilled
      - id: RMCBeltHolsterPistolTSE
    - name: Bag
      choices: { CMUCMBDutyStorageBag: 1 }
      entries:
      - id: CMSatchelSecurity
      - id: AU14SlingSatchelBlack
      - id: RMCSatchelTSEPA
    - name: Webbing
      choices: { CMUCMBDutyStorageWebbing: 1 }
      entries:
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
      - id: RMCWebbingLegPouchBlack
    - name: Pouches
      choices: { CMUCMBDutyPouches: 2 }
      entries:
      - id: AU14PouchIFAKFill
      - id: RMCPouchRadio
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchMagazinePistol
    - name: Equipment
      takeAll: CMUCMBEssentialEquipment
      entries:
      - id: RMCBinocularsCivPVE
      - id: RMCHandcuffs
      - id: RMCRadioHandheldColonyOff
    - name: Duty Weapons
      choices: { CMUCMBDutyWeapons: 1 }
      entries:
      - id: RMCGunCasePistolM1984
      - id: AU14GunCasePistolHG45
    - name: Restraining Gear
      entries:
      - id: RMCHandcuffs
        amount: 10
      - id: RMCZipties
        amount: 30
    - name: Inmate Clothing
      entries:
      - id: AU14CivilianPrisonJumpsuit
        amount: 40
      - id: RMCShoesBlack
        amount: 40

