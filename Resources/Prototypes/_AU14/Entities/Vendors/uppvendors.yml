  id: AU14UPPSectionLeaderVendor
  name: UPP section leader vendor
  description: >-
    An automated equipment rack, hooked up to a compact storage of Union of Progressive Peoples section-leadership equipment.
    Designed for immediate readiness following cryogenic hypersleep or rapid mobilization orders.
  components:
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessOpforFTL" ] ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Apparel
      choices: { CMHat: 1 }
      entries:
      - id: CMHeadCapSPPBeret
    - name: Equipment
      takeAll: CMStandard
      entries:
      - id: RMCLaserDesignator
      - id: RMCWhistle
      - id: RMCPackFlareCAS

- type: entity
  parent: ColMarTechBase
  id: AU14UPPWeaponsVendor
  name: UPP weapons rack
  description: >-
    An automated weapons rack, hooked up to a small armory of Union of Progressive Peoples weaponry.
    Standard issue across the frontier where threats can appear without warning.
    Engineered to arm personnel in seconds following cryogenic hypersleep or emergency mobilization.

    For immediate combat readiness: select a primary weapon kit and a sidearm.
  components:
  - type: AccessReader
    access: [ [ "AU14AccessGovforSquad" ], [ "AU14AccessOpforSquad" ] ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/guns.rsi
  - type: CMAutomatedVendor
    sections:
    - name: Weapons
      choices: { CMUPrimaryWeapon: 1 }
      entries:
      - id: AU14KitWeaponAG80
      - id: AU14KitWeaponType64
    - name: Weapon Ammunition
      entries:
      - id: AU14MagazineRifleAG80
        amount: 60
      - id: RMCMagazineSMGType64
        amount: 60
    - name: Handguns
      choices: { CMUHandgunsWeapon: 1 }
      entries:
      - id: AU14KitWeaponType74
      - id: AU14KitWeaponType73
    - name: Handgun Ammunition
      entries:
      - id: RMCMagazinePistolT73
        amount: 60
    - name: Attachments
      choices: { CMUAttachmentsVendor: 1 }
      entries:
      - id: RMCAttachmentTwoPointSling
      - id: RMCAttachmentRailFlashlight

- type: entity
  parent: AU14SpecVend
  id: AU14UPPSpecialWeaponsVendor
  name: UPP weapons specialist rack
  description: >-
    An automated special weapons rack, hooked up to a restricted armory of Union of Progressive Peoples heavy and breaching ordnance.
    Standard issue only for qualified operators.
    Engineered to deliver overwhelming firepower the instant cryogenic hypersleep ends or an emergency mobilization is called.

    Special weapons protocol: one weapon system of choice with a full ammunition loadout and explosives.
  components:
  - type: CMAutomatedVendor
    sections:
    - name: Weapons Specialist Sets
      takeOne: SquadSpecKit
      sharedSpecLimit: 1
      entries:
      - id: AU14KitUPPPointmanType23
        giveSquadRoleName: au14-job-name-govforspecialist-pointmanUPP
        givePrefix: au14-job-prefix-govforspecialist-pointmanUPP
        isAppendSquadRoleName: false
        isAppendPrefix: true
      - id: AU14KitUPPHATHJRA12
        giveSquadRoleName: au14-job-name-govforspecialist-heavyantitankUPP
        givePrefix: au14-job-prefix-govforspecialist-heavyantitankUPP
        isAppendSquadRoleName: false
        isAppendPrefix: true
      - id: AU14KitUPPMarksmanType88
        giveSquadRoleName: au14-job-name-govforspecialist-marksmanUPP
        givePrefix: au14-job-prefix-govforspecialist-marksmanUPP
        isAppendSquadRoleName: false
        isAppendPrefix: true
      - id: AU14KitUPPPyroLPO80
        giveSquadRoleName: au14-job-name-specialist-pyro
        givePrefix: au14-job-prefix-specialist-pyro
        isAppendSquadRoleName: false
        isAppendPrefix: true

