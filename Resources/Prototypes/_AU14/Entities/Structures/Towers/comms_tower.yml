- type: entity
  parent: RMCCommunicationsTower
  id: AU14CommunicationsTower
  suffix: "Default, Empty"
  name: TC-5F static telecommunications tower
  description: A static heavy-duty TC-5F telecom-frequency tower. Used to set up subspace communications lines between planetary and extra-planetary locations. Will need to have extra communication frequencies programmed into it by multitool.
  components:
  - type: RMCRepairable
    heal: 150
    skillRequired: 1
    delay: 5
    fuelUsed: 0
  - type: MaxDamage
    max: 500
  - type: MarineMapTracked
  - type: XenoMapTracked
  - type: TacticalMapTracked
  - type: ActiveTacticalMapTracked
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: supply
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: supply
  - type: ApcPowerReceiver
  - type: RMCPowerReceiver
    idleLoad: 0
    activeLoad: 10000
    channel: Equipment

