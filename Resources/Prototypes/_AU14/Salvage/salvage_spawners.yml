# Salvage spawner entities. Interact with empty hands for a 10-second doafter, then a random junk item spawns.
# Uses n14 deco visuals so they blend into the environment.

- type: entity
  id: SalvageSpawnerBase
  abstract: true
  components:
  - type: SalvageSpawner
    doAfterTime: 10
    loot:
    # Tier 1
    - ScrapBucket
    - ScrapCanister2
    - ScrapCamera
    - ScrapMedkit
    - ScrapTube
    - BrokenBottle
    - TreasureCoinIron
    - TreasureSampleTube
    - ProximitySensor
    # Tier 2
    - ScrapAirlock2
    - ScrapCanister1
    - ScrapFireExtinguisher
    - ScrapIntercom
    - ScrapPAI
    - ScrapMopBucket
    - TreasureCoinSilver
    - TreasureHardDiskDrive
    - TreasureFlopDiskDrive
    - TreasureCDDrive
    - MicroManipulatorStockPart
    # Tier 3
    - ScrapFaxMachine
    - ScrapFirelock3
    - ScrapAirlock1
    - ScrapSteel
    - ScrapGlass
    - ScrapJetpack
    - BrokenEnergyShield
    - TreasureCoinGold
    - TreasureDatadiskEncrypted
    - TreasureCPUSupercharged
    # Tier 4
    - ScrapFirelock1
    - ScrapFirelock2
    - ScrapCloset
    - ScrapGeneratorFrame
    - ScrapGeneratorFuelTank
    - ScrapGeneratorPlasma
    - ScrapGeneratorUranium
    - TreasureCoinAdamantine
    - ScrapPAIGold
    # Tier 5
    - ScrapGeneratorPlasmaLeaking
    - ScrapGeneratorUraniumLeaking
    - TreasureCoinDiamond

# --- Existing n14 deco types ---

- type: entity
  parent: [ DecorBarrels, SalvageSpawnerBase ]
  id: SalvageSpawnerBarrels
  name: salvage barrels
  description: A cluster of old rusty barrels. Something useful might be stuffed inside.

- type: entity
  parent: [ DecorFloorTrashbags1, SalvageSpawnerBase ]
  id: SalvageSpawnerTrashbags
  name: salvage trash heap
  description: A heap of old trash bags. Hard to say what someone left in there.
  components:
  - type: Sprite
    layers:
    - state: trashbags_1
      map: [ "body" ]
  - type: RandomSprite
    available:
    - body:
        trashbags_1: ""
        trashbags_2: ""
        trashbags_3: ""
        trashbags_4: ""
        trashbags_5: ""
        trashbags_6: ""

- type: entity
  parent: [ DecorFloorScrapwood, SalvageSpawnerBase ]
  id: SalvageSpawnerScrapwood
  name: salvage wood pile
  description: A tangle of old scrap lumber. Something might be buried underneath.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
            radius: 0.25
        density: 1000
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  parent: [ DecorFloorBrickrubble, SalvageSpawnerBase ]
  id: SalvageSpawnerRubble
  name: salvage rubble
  description: Crumbled brick and mortar with something glinting underneath.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
            radius: 0.25
        density: 1000
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  parent: [ DecorFloorCardboard, SalvageSpawnerBase ]
