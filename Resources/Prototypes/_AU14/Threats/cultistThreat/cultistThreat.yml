- type: threat
  id: cultistThreat
  lorePrimer: AU14PrimerThreatCultist
  roundstartspawns: cultistPartyThreat
  thirdpartyinterval: 9100
  whitelistedgamemodes:
  - ColonyFall
  blacklistedgamemodes:
  - DistressSignal
  winconditions:
    - KillAllColonistRule
    - KillAllXenoRule

- type: threat
  id: cultistThreatOnMarker
  roundstartspawns: cultistPartyThreatOnMarkers
  thirdpartyinterval: 9100
  whitelistedgamemodes:
  - ColonyFall
  blacklistedgamemodes:
  - DistressSignal
  winconditions:
    - KillAllColonistRule
    - KillAllXenoRule

- type: partySpawn
  id: cultistPartyThreat
  leadersToSpawn:
    CMXenoQueen: 1
  gruntsToSpawn:
    cultistJob: 3
  spawnTogether: true

- type: partySpawn
  id: cultistParty
  leadersToSpawn:
    CMXenoQueen: 1
  gruntsToSpawn:
    cultistJob: 2
  spawnTogether: true
  scaling:
#   CMXenoQueen:
#     scale: 0.05
#     whenToBeginScaling: 50
    cultistJob:
      scale: 0.05
      whenToBeginScaling: 50

- type: partySpawn
  id: cultistPartyNoQueen
  leadersToSpawn:
    cultistJob: 1
  gruntsToSpawn:
    cultistJob: 1
  spawnTogether: true
  scaling:
    cultistJob:
      scale: 0.08
      benchmark: 3
      whenToBeginScaling: 50

- type: auThirdParty
  id: cultistThirdParty
  partyspawn: cultistParty
  blacklistedgamemodes:
  - insurgency
  - forceonforce
  - DistressSignal
  entrymethod: shuttle
  weight: 3
  minplayers: 70
  maxplayers: 200
  GhostsNeeded: 3
  roundstart: false

- type: auThirdParty
  id: cultistThirdPartyNoQueen
  partyspawn: cultistPartyNoQueen
  blacklistedgamemodes:
  - insurgency
  - forceonforce
  - DistressSignal
  entrymethod: ground
  weight: 15
  minplayers: 35
  maxplayers: 200
  GhostsNeeded: 3
  roundstart: true

- type: partySpawn
  id: cultistPartyThreatOnMarkers
  leadersToSpawn:
    CMXenoQueen: 1
  gruntsToSpawn:
    cultistJob: 3
  spawnTogether: true
  scaling:
#   CMXenoQueen:
#     scale: 0.05
#     whenToBeginScaling: 50
    cultistJob:
      scale: 0.03
      benchmark: 4
      whenToBeginScaling: 50
  Markers:
    Member: cultcfmarker
    Leader: cultcfmarker

- type: lorePrimer
  id: AU14PrimerThreatCultist
  threattext: "You are a member of the hive, grow and evolve!"
  KnowledgeLevelsGovforThreat:
    "Threat Unknown": 1
    "Colony reports mention coordinated disappearances tied to unknown cells.": 2
    "Signal analysis points to a structured hostile network embedded in the AO.": 3
